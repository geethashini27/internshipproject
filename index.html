<!DOCTYPE html>
<html>
<head>
    <title>Credit Risk Prediction System</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:500px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#1e3c72;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        input{
            width:100%;
            padding:15px;
            margin:10px 0;
            font-size:18px;
            border:2px solid #ddd;
            border-radius:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:15px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#2a5298;
        }

        .result{
            margin-top:20px;
            padding:15px;
            background:#d4edda;
            color:#155724;
            border-radius:10px;
            font-size:22px;
            font-weight:bold;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🏦 Credit Risk Prediction System</h1>

    <p>Predict whether a customer is Safe or Risky for loan approval</p>

    <form action="/predict" method="POST">

        <input type="number"
               name="income"
               placeholder="Enter Customer Income"
               required>

        <input type="number"
               name="loan_amount"
               placeholder="Enter Loan Amount"
               required>

        <input type="number"
               name="credit_score"
               placeholder="Enter Credit Score"
               required>

        <button type="submit">
            Predict Credit Risk
        </button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

</div>

</body>
</html>
